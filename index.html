<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Календарь мастера</title>

  <!-- PWA Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Календарь мастера" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#008080" />
  <meta name="background-color" content="#FFFDF9" />
  <meta name="description" content="Приложение для записи на услуги (кератин, ботокс, холодное, полировка)" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/calendar-frontend/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" href="/calendar-frontend/favicon.ico" />
  <link rel="apple-touch-icon" href="/calendar-frontend/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/calendar-frontend/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/calendar-frontend/icons/icon-512.png" />

  <!-- Стили -->
  <link rel="stylesheet" href="/calendar-frontend/styles.css" />
</head>
<body>

  <!-- Лоадер -->
  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p>📅 Загрузка приложения...</p>
  </div>

  <!-- Форма входа (показывается если нет токена) -->
  <div id="loginContainer">
    <div class="login-box">
      <h1>Добро пожаловать</h1>
      <div class="subtitle">Войдите в систему</div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Имя пользователя</label>
          <input type="text" id="username" placeholder="Введите имя" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" placeholder="Введите пароль" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn" id="loginBtn">Войти</button>
      </form>

      <div class="loading-text" id="loginLoading">
        <span class="spinner"></span> Вход в систему...
      </div>

      <div id="loginMessage" class="message"></div>
    </div>
  </div>

  <!-- IFRAME с GAS-приложением -->
  <iframe id="app-frame" src="{{GAS_URL}}" allow="geolocation; microphone; camera; midi; encrypted-media" loading="lazy"></iframe>

  <!-- Баннер установки PWA -->
  <div id="installBanner" class="install-banner">
    <span class="message">📱 Установите приложение на домашний экран</span>
    <div class="actions">
      <button class="btn-install" id="installBtn">Установить</button>
      <button class="btn-close" id="closeBanner">✕</button>
    </div>
  </div>

  <script>
    // ============================================
    //  КОНФИГУРАЦИЯ
    // ============================================
    var GAS_URL = '{{GAS_URL}}';

    // ============================================
    //  ФУНКЦИИ ДЛЯ РАБОТЫ С ФОРМОЙ ВХОДА
    // ============================================
    function showLoginMessage(text, type) {
      var el = document.getElementById('loginMessage');
      el.className = 'message ' + type;
      el.textContent = text;
      el.style.display = 'block';
    }

    function hideLoginMessage() {
      var el = document.getElementById('loginMessage');
      el.style.display = 'none';
      el.className = 'message';
    }

    function showLoginForm() {
      document.getElementById('loginContainer').classList.add('show');
      document.getElementById('loader').style.display = 'none';
    }

    function hideLoginForm() {
      document.getElementById('loginContainer').classList.remove('show');
    }

    // ============================================
    //  ПРОВЕРКА ТОКЕНА И ЗАГРУЗКА ПРИЛОЖЕНИЯ
    // ============================================
    (function checkAuth() {
      var token = localStorage.getItem('authToken');
      
      if (!token) {
        console.log('🔐 Нет токена, показываем форму входа');
        showLoginForm();
        return;
      }
      
      console.log('🔑 Токен есть, загружаем приложение...');
      
      // Отправляем токен через fetch с Authorization header
      fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ action: 'app' })
      })
      .then(function(response) { return response.text(); })
      .then(function(html) {
        // Проверяем, не вернулась ли ошибка
        try {
          var data = JSON.parse(html);
          if (data.status === 'error') {
            // Токен невалиден
            localStorage.removeItem('authToken');
            localStorage.removeItem('userRole');
            localStorage.removeItem('username');
            showLoginForm();
            showLoginMessage(data.message || 'Сессия истекла. Войдите заново.', 'error');
            return;
          }
        } catch(e) {
          // Это HTML, а не JSON — всё хорошо
        }
        
        // Скрываем форму входа и лоадер
        hideLoginForm();
        document.getElementById('loader').classList.add('hidden');
        setTimeout(function() {
          document.getElementById('loader').style.display = 'none';
        }, 500);
        
        // Загружаем App.html в iframe
        var iframe = document.getElementById('app-frame');
        iframe.srcdoc = html;
      })
      .catch(function(error) {
        console.error('❌ Ошибка загрузки приложения:', error);
        showLoginForm();
        showLoginMessage('Ошибка загрузки приложения. Попробуйте обновить страницу.', 'error');
      });
    })();

    // ============================================
    //  ОБРАБОТКА ВХОДА
    // ============================================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      hideLoginMessage();
      
      var loadingEl = document.getElementById('loginLoading');
      var loginBtn = document.getElementById('loginBtn');
      
      loadingEl.classList.remove('show');

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value.trim();

      if (!username || !password) {
        showLoginMessage('Заполните все поля.', 'error');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Вход...';
      loadingEl.classList.add('show');

      // Отправляем запрос на логин
      fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          action: 'login',
          username: username,
          password: password
        })
      })
      .then(function(response) { return response.text(); })
      .then(function(text) {
        loadingEl.classList.remove('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';

        try {
          var data = JSON.parse(text);
          if (data.status === 'error') {
            showLoginMessage(data.message || 'Ошибка входа', 'error');
            return;
          }
        } catch(e) {}

        // Сохраняем токен
        localStorage.setItem('authToken', username);
        localStorage.setItem('userRole', 'user');
        localStorage.setItem('username', username);
        localStorage.setItem('scripts_loaded', 'true');

        // Скрываем форму входа и лоадер
        hideLoginForm();
        document.getElementById('loader').classList.add('hidden');
        setTimeout(function() {
          document.getElementById('loader').style.display = 'none';
        }, 500);

        // Загружаем App.html в iframe
        var iframe = document.getElementById('app-frame');
        iframe.srcdoc = text;
      })
      .catch(function(error) {
        loadingEl.classList.remove('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';
        console.error('❌ Ошибка:', error);
        showLoginMessage('Ошибка соединения: ' + error.message, 'error');
      });
    });

    // ============================================
    //  РЕГИСТРАЦИЯ SERVICE WORKER
    // ============================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/calendar-frontend/sw.js')
        .then(function(registration) {
          console.log('✅ Service Worker зарегистрирован:', registration);
        })
        .catch(function(error) {
          console.warn('⚠️ Service Worker не зарегистрирован:', error);
        });
    }

    // ============================================
    //  PWA: БАННЕР УСТАНОВКИ
    // ============================================
    var deferredPrompt;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').classList.add('show');
    });

    document.getElementById('installBtn').addEventListener('click', function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          console.log('✅ Установка:', result.outcome);
          deferredPrompt = null;
          document.getElementById('installBanner').classList.remove('show');
        });
      }
    });

    document.getElementById('closeBanner').addEventListener('click', function() {
      document.getElementById('installBanner').classList.remove('show');
    });

    window.addEventListener('appinstalled', function() {
      document.getElementById('installBanner').classList.remove('show');
      console.log('✅ Приложение установлено');
    });

    // ============================================
    //  ОФЛАЙН-СООБЩЕНИЕ В IFRAME
    // ============================================
    var iframe = document.getElementById('app-frame');

    window.addEventListener('online', function() {
      console.log('🟢 Сеть восстановлена');
      iframe.contentWindow?.postMessage({ type: 'online' }, '*');
    });

    window.addEventListener('offline', function() {
      console.log('🔴 Сеть отсутствует');
      iframe.contentWindow?.postMessage({ type: 'offline' }, '*');
    });

    // ============================================
    //  ОБРАБОТКА УВЕДОМЛЕНИЙ ИЗ GAS
    // ============================================
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'notification') {
        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({
            type: 'showNotification',
            title: 'Календарь мастера',
            body: event.data.message,
            timestamp: event.data.timestamp || Date.now()
          });
        }
      }
    });
  </script>

</body>
</html>
