<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Календарь мастера</title>

    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#008080" />
    <meta name="description" content="Приложение для записи на услуги" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <link rel="stylesheet" href="styles.css" />

    <!-- Конфигурация ({{GAS_URL}} заменяется GitHub Actions) -->
    <script>
        const GAS_URL = '{{GAS_URL}}';
    </script>
</head>
<body>

    <div id="app">
        <!-- Блок авторизации -->
        <div id="authBlock">
            <h1>Добро пожаловать</h1>
            <div class="subtitle">Войдите в систему</div>

            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Имя пользователя" required />
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Пароль" required />
                </div>
                <button type="submit" class="btn" id="loginBtn">Войти</button>
            </form>

            <div class="loading-text" id="loginLoading">
                <span class="spinner"></span> Вход...
            </div>

            <div id="message" class="message"></div>
        </div>

        <!-- Блок приложения (скрыт до авторизации) -->
        <div id="appBlock" style="display:none;">
            <div id="appContent"></div>
        </div>
    </div>

    <script>
        // ============================================
        //  ЗАГРУЗЧИК ПРИЛОЖЕНИЯ
        // ============================================

        (function() {
            'use strict';

            var authBlock = document.getElementById('authBlock');
            var appBlock = document.getElementById('appBlock');
            var loginForm = document.getElementById('loginForm');
            var usernameInput = document.getElementById('username');
            var passwordInput = document.getElementById('password');
            var loginBtn = document.getElementById('loginBtn');
            var messageEl = document.getElementById('message');
            var loadingEl = document.getElementById('loginLoading');

            function showMessage(text, type) {
                messageEl.className = 'message ' + type;
                messageEl.textContent = text;
                messageEl.style.display = 'block';
            }

            function hideMessage() {
                messageEl.style.display = 'none';
                messageEl.className = 'message';
            }

            function showAuth() {
                authBlock.style.display = 'block';
                appBlock.style.display = 'none';
            }

            function showApp() {
                authBlock.style.display = 'none';
                appBlock.style.display = 'block';
            }

            function saveScripts(scripts) {
                try {
                    for (var key in scripts) {
                        if (scripts.hasOwnProperty(key)) {
                            localStorage.setItem('script_' + key, scripts[key]);
                        }
                    }
                    localStorage.setItem('scripts_loaded', 'true');
                    console.log('✅ Скрипты сохранены в localStorage');
                } catch (e) {
                    console.error('❌ Ошибка сохранения скриптов:', e);
                }
            }

            function loadScriptsFromStorage() {
                var scripts = {};
                var keys = ['config', 'cache', 'api', 'auth', 'canvas', 'calendar', 'modal', 'detail', 'notifications', 'filters', 'windows', 'main'];
                var allLoaded = true;

                for (var i = 0; i < keys.length; i++) {
                    var key = keys[i];
                    var content = localStorage.getItem('script_' + key);
                    if (content) {
                        scripts[key] = content;
                    } else {
                        allLoaded = false;
                        console.warn('⚠️ Скрипт ' + key + ' не найден в localStorage');
                    }
                }

                return allLoaded ? scripts : null;
            }

            function executeScripts(scripts) {
                try {
                    var order = ['config', 'cache', 'api', 'auth', 'canvas', 'calendar', 'modal', 'detail', 'notifications', 'filters', 'windows', 'main'];
                    for (var i = 0; i < order.length; i++) {
                        var key = order[i];
                        if (scripts[key]) {
                            eval(scripts[key]);
                            console.log('✅ Выполнен: ' + key);
                        }
                    }
                    return true;
                } catch (e) {
                    console.error('❌ Ошибка выполнения скриптов:', e);
                    return false;
                }
            }

            function initApp() {
                var scripts = loadScriptsFromStorage();

                if (scripts) {
                    if (executeScripts(scripts)) {
                        if (typeof window.initApp === 'function') {
                            window.initApp();
                        } else {
                            console.error('❌ initApp не найдена после выполнения скриптов');
                        }
                        showApp();
                        return;
                    }
                }

                showAuth();
                console.log('🔐 Нет скриптов в localStorage, показываем страницу входа');
            }

            // === АВТОРИЗАЦИЯ ===

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                hideMessage();
                loadingEl.classList.remove('show');
                loginBtn.disabled = true;

                var username = usernameInput.value.trim();
                var password = passwordInput.value.trim();

                if (!username || !password) {
                    showMessage('Заполните все поля', 'error');
                    loginBtn.disabled = false;
                    return;
                }

                loadingEl.classList.add('show');

                // === ЗАПРОС К GAS ===
                var url = GAS_URL + '?action=login&username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password);

                fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                })
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('Ошибка сервера: ' + response.status);
                    }
                    return response.json();
                })
                .then(function(data) {
                    loadingEl.classList.remove('show');
                    loginBtn.disabled = false;

                    if (data.status === 'ok') {
                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('userRole', data.user.role || 'user');

                        if (data.scripts) {
                            saveScripts(data.scripts);
                        } else {
                            console.warn('⚠️ Скрипты не получены от сервера');
                            showMessage('Ошибка: скрипты не получены', 'error');
                            return;
                        }

                        showMessage('✅ Вход выполнен!', 'success');
                        initApp();

                    } else {
                        showMessage(data.message || 'Неверное имя пользователя или пароль', 'error');
                    }
                })
                .catch(function(error) {
                    loadingEl.classList.remove('show');
                    loginBtn.disabled = false;
                    console.error('❌ Ошибка:', error);
                    showMessage('Ошибка соединения: ' + error.message, 'error');
                });
            });

            function checkAuth() {
                var token = localStorage.getItem('authToken');
                if (token) {
                    initApp();
                } else {
                    showAuth();
                }
            }

            // === РЕГИСТРАЦИЯ SERVICE WORKER ===

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(registration) {
                        console.log('✅ Service Worker зарегистрирован');
                    })
                    .catch(function(error) {
                        console.warn('⚠️ Service Worker не зарегистрирован:', error);
                    });
            }

            // === ЗАПУСК ===
            checkAuth();

            console.log('✅ Страница загружена');

        })();
    </script>

</body>
</html>
