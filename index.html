<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Календарь мастера</title>
  
  <!-- Подключение шрифтов -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== Базовый сброс и стили ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', 'Inter', sans-serif;
      background: #FFFDF9;
      color: #37474F;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #app {
      max-width: 480px;
      width: 100%;
      background: #FFFDF9;
      border-radius: 32px;
      padding: 30px 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      color: #008080;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: #7B8D8E;
      margin-bottom: 28px;
      font-weight: 400;
      border-left: 3px solid #008080;
      padding-left: 12px;
    }

    /* ===== Форма ===== */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #37474F;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #E0F2F1;
      border-radius: 14px;
      font-size: 16px;
      font-family: 'Montserrat', sans-serif;
      color: #37474F;
      background: #FFFFFF;
      transition: border 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #008080;
      box-shadow: 0 0 0 4px rgba(0, 128, 128, 0.08);
    }

    .form-group input::placeholder {
      color: #B0BEC5;
      font-weight: 300;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: #008080;
      color: #FFFFFF;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    .btn-primary:hover {
      background: #006666;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== Сообщения ===== */
    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      font-weight: 500;
    }

    .message.error {
      display: block;
      background: #FFEBEE;
      color: #C62828;
      border-left: 4px solid #C62828;
    }

    .message.success {
      display: block;
      background: #E0F2F1;
      color: #006666;
      border-left: 4px solid #008080;
    }

    .message.info {
      display: block;
      background: #E3F2FD;
      color: #0D47A1;
      border-left: 4px solid #0D47A1;
    }

    /* ===== Контейнер для календаря ===== */
    #calendarContainer {
      margin-top: 20px;
      display: none;
    }

    /* ===== Адаптивность ===== */
    @media (max-width: 480px) {
      #app {
        padding: 24px 16px;
        border-radius: 24px;
      }

      h1 {
        font-size: 22px;
      }

      .form-group input {
        padding: 12px 14px;
        font-size: 15px;
      }

      .btn-primary {
        padding: 14px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div id="app">
    <!-- Блок авторизации -->
    <div id="authBlock">
      <h1>Добро пожаловать</h1>
      <div class="subtitle">Войдите в систему</div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Имя пользователя</label>
          <input 
            type="text" 
            id="username" 
            placeholder="Введите имя" 
            required 
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Введите пароль" 
            required 
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">Войти</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <!-- Контейнер для календаря (загружается после входа) -->
    <div id="calendarContainer"></div>
  </div>

  <!-- ====== Подключение config.js ====== -->
  <script src="config.js"></script>
  
  <!-- ====== Проверка конфигурации ====== -->
  <script>
    // Проверка, что config.js загружен и задал GAS_URL
    if (typeof GAS_URL === 'undefined') {
      document.getElementById('message').className = 'message error';
      document.getElementById('message').textContent = 'Ошибка конфигурации: не найден URL бэкенда.';
      document.getElementById('message').style.display = 'block';
      document.getElementById('loginBtn').disabled = true;
      throw new Error('GAS_URL is not defined. Проверьте config.js');
    }

    console.log('✅ GAS_URL загружен:', GAS_URL);
  </script>

  <!-- ====== Основной скрипт ====== -->
  <script>
    (function() {
      'use strict';

      // Элементы
      const authBlock = document.getElementById('authBlock');
      const calendarContainer = document.getElementById('calendarContainer');
      const loginForm = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const messageEl = document.getElementById('message');

      // Состояние
      let isProcessing = false;

      // ===== Вспомогательные функции =====
      function showMessage(text, type = 'error') {
        messageEl.className = `message ${type}`;
        messageEl.textContent = text;
        messageEl.style.display = 'block';
      }

      function hideMessage() {
        messageEl.style.display = 'none';
        messageEl.className = 'message';
      }

      function setLoading(loading) {
        isProcessing = loading;
        loginBtn.disabled = loading;
        loginBtn.textContent = loading ? 'Вход...' : 'Войти';
      }

      // ===== Проверка токена при загрузке =====
      function checkToken() {
        const token = localStorage.getItem('authToken');
        if (!token) return false;

        // Пока просто проверяем наличие токена
        // В будущем здесь будет валидация на сервере
        return true;
      }

      // ===== Автоматический вход, если есть токен =====
      function autoLogin() {
        if (checkToken()) {
          // Пока только уведомление, в будущем — загрузка календаря
          showMessage('Вы уже авторизованы. Загрузка календаря...', 'success');
          // В следующем этапе здесь будет вызов /getData
          setTimeout(() => {
            // Заглушка — переключим интерфейс
            authBlock.style.display = 'none';
            calendarContainer.style.display = 'block';
            calendarContainer.innerHTML = `
              <div style="text-align: center; padding: 40px 0;">
                <p style="font-size: 18px; color: #008080;">📅 Календарь загружается...</p>
                <p style="font-size: 14px; color: #7B8D8E; margin-top: 8px;">Функционал будет доступен в следующем этапе</p>
              </div>
            `;
            hideMessage();
          }, 1000);
        }
      }

      // ===== Обработка формы входа =====
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessage();

        if (isProcessing) return;

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
          showMessage('Пожалуйста, заполните все поля.', 'error');
          return;
        }

        setLoading(true);

        try {
          // Формируем URL для запроса к GAS
          const url = new URL(GAS_URL);
          // Добавляем параметры (пока логин не реализован, просто проверяем соединение)
          url.searchParams.append('action', 'login');
          url.searchParams.append('username', username);
          url.searchParams.append('password', password);

          const response = await fetch(url.toString(), {
            method: 'GET',
            headers: {
              'Accept': 'application/json'
            }
          });

          if (!response.ok) {
            throw new Error(`Ошибка сервера: ${response.status}`);
          }

          const data = await response.json();

          // Временная проверка (пока бэкенд возвращает простой ответ)
          if (data.status === 'ok') {
            // Сохраняем токен (в будущем — настоящий токен)
            localStorage.setItem('authToken', username);
            showMessage('Вход выполнен успешно!', 'success');

            // Переключаем интерфейс на календарь
            setTimeout(() => {
              authBlock.style.display = 'none';
              calendarContainer.style.display = 'block';
              calendarContainer.innerHTML = `
                <div style="text-align: center; padding: 40px 0;">
                  <p style="font-size: 18px; color: #008080;">Добро пожаловать, ${username}! 👋</p>
                  <p style="font-size: 14px; color: #7B8D8E; margin-top: 8px;">Календарь появится в следующем этапе</p>
                </div>
              `;
              hideMessage();
            }, 800);
          } else {
            showMessage(data.message || 'Неверное имя пользователя или пароль.', 'error');
          }
        } catch (err) {
          console.error('Ошибка входа:', err);
          showMessage(`Ошибка соединения: ${err.message}`, 'error');
        } finally {
          setLoading(false);
        }
      });

      // ===== Инициализация =====
      // Проверяем, есть ли уже токен
      autoLogin();

      // Если нет токена — оставляем форму входа
      console.log('🔐 Ожидание входа...');

    })();
  </script>
</body>
</html>
