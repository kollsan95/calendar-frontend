<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Календарь мастера</title>
  
  <!-- Кеш-контроль -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <!-- Подключение шрифтов -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Подключение стилей с версией -->
  <link rel="stylesheet" href="styles.css?v={{VERSION}}" />
</head>
<body>

  <div id="app">
    <!-- Блок авторизации -->
    <div id="authBlock">
      <h1>Добро пожаловать</h1>
      <div class="subtitle">Войдите в систему</div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Имя пользователя</label>
          <input 
            type="text" 
            id="username" 
            placeholder="Введите имя" 
            required 
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Введите пароль" 
            required 
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">Войти</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <!-- Контейнер для календаря -->
    <div id="calendarContainer"></div>
  </div>

  <!-- Подключение основного скрипта с версией -->
  <script src="script.js?v={{VERSION}}"></script>
</body>
</html>
