<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Календарь мастера</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#008080" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- Лоадер -->
  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p>📅 Загрузка приложения...</p>
  </div>

  <!-- {{GAS_URL}} заменяется GitHub Actions -->
  <iframe id="app-frame" src="{{GAS_URL}}" allow="geolocation; microphone; camera; midi; encrypted-media" loading="lazy"></iframe>

  <!-- Баннер установки PWA -->
  <div id="installBanner" class="install-banner">
    <span>📱 Установите приложение на домашний экран</span>
    <div>
      <button id="installBtn">Установить</button>
      <button id="closeBanner" class="close">✕</button>
    </div>
  </div>

  <script>
    // {{GAS_URL}} заменяется GitHub Actions
    const GAS_URL = '{{GAS_URL}}';

    // === Устанавливаем src IFRAME ===
    document.getElementById('app-frame').src = GAS_URL;

    // === Регистрация Service Worker ===
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('✅ Service Worker зарегистрирован'))
        .catch((err) => console.warn('⚠️ Service Worker не зарегистрирован:', err));
    }

    // === Скрываем лоадер ===
    const iframe = document.getElementById('app-frame');
    const loader = document.getElementById('loader');

    iframe.addEventListener('load', () => {
      setTimeout(() => {
        loader.classList.add('hidden');
        setTimeout(() => {
          loader.style.display = 'none';
        }, 500);
      }, 300);
    });

    // === Обработка ошибок загрузки ===
    iframe.addEventListener('error', () => {
      loader.innerHTML = `
        <div style="text-align: center; padding: 20px;">
          <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
          <h3 style="color: #C62828;">Не удалось загрузить приложение</h3>
          <p style="color: #7B8D8E; margin-top: 8px;">
            Проверьте подключение к интернету и попробуйте обновить страницу.
          </p>
          <button onclick="location.reload()" style="margin-top: 16px; padding: 10px 24px; background: #008080; color: #FFF; border: none; border-radius: 12px; font-size: 16px; cursor: pointer;">
            Обновить
          </button>
        </div>
      `;
    });

    // === PWA: Установка на домашний экран ===
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').classList.add('show');
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        console.log('✅ Установка:', result.outcome);
        deferredPrompt = null;
        document.getElementById('installBanner').classList.remove('show');
      }
    });

    document.getElementById('closeBanner').addEventListener('click', () => {
      document.getElementById('installBanner').classList.remove('show');
    });

    window.addEventListener('appinstalled', () => {
      document.getElementById('installBanner').classList.remove('show');
      console.log('✅ Приложение установлено');
    });

    // === Офлайн-баннер ===
    window.addEventListener('online', () => {
      console.log('🟢 Сеть восстановлена');
      iframe.contentWindow?.postMessage({ type: 'online' }, '*');
    });

    window.addEventListener('offline', () => {
      console.log('🔴 Сеть отсутствует');
      iframe.contentWindow?.postMessage({ type: 'offline' }, '*');
    });
  </script>
</body>
</html>
