<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Календарь мастера</title>

    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#008080" />
    <meta name="background-color" content="#FFFDF9" />
    <meta name="description" content="Приложение для записи на услуги (кератин, ботокс, холодное, полировка)" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Иконки -->
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
</head>
<body>

    <div id="app">
        <!-- Блок авторизации -->
        <div id="authBlock">
            <h1>Добро пожаловать</h1>
            <div class="subtitle">Войдите в систему</div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" placeholder="Введите имя" required autocomplete="username" />
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required autocomplete="current-password" />
                </div>
                <button type="submit" class="btn" id="loginBtn">Войти</button>
            </form>

            <div class="loading-text" id="loginLoading">
                <span class="spinner"></span> Вход в систему...
            </div>

            <div id="message" class="message"></div>
        </div>

        <!-- Лоадер приложения -->
        <div class="app-loader" id="appLoader">
            <div class="spinner"></div>
            <p>Загрузка приложения...</p>
        </div>

        <!-- Контейнер для приложения -->
        <div id="appContent"></div>
    </div>

    <!-- Баннер установки PWA -->
    <div id="installBanner" class="install-banner">
        <span class="message">📱 Установите приложение на домашний экран</span>
        <div>
            <button class="btn-install" id="installBtn">Установить</button>
            <button class="btn-close" id="closeInstallBtn">✕</button>
        </div>
    </div>

    <script>
        // === КОНФИГУРАЦИЯ ===
        // {{GAS_URL}} заменяется GitHub Actions
        var GAS_URL = '{{GAS_URL}}';

        // === ФУНКЦИЯ ХЕШИРОВАНИЯ ПАРОЛЯ ===
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + 'salt_calendar_2024'); // Добавляем соль
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        // === РЕГИСТРАЦИЯ SERVICE WORKER ===
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/calendar-frontend/sw.js')
                .then(function(registration) {
                    console.log('✅ Service Worker зарегистрирован');
                    
                    // Отправляем GAS_URL в SW сразу после активации
                    if (registration.active) {
                        registration.active.postMessage({
                            type: 'SET_GAS_URL',
                            url: GAS_URL
                        });
                    } else {
                        // Если SW ещё не активирован, ждём
                        navigator.serviceWorker.ready.then(function(reg) {
                            if (reg.active) {
                                reg.active.postMessage({
                                    type: 'SET_GAS_URL',
                                    url: GAS_URL
                                });
                            }
                        });
                    }
                })
                .catch(function(err) {
                    console.warn('⚠️ Service Worker не зарегистрирован:', err);
                });
        }

        // === PWA: БАННЕР УСТАНОВКИ ===
        var deferredPrompt;

        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').classList.add('show');
        });

        document.getElementById('installBtn').addEventListener('click', function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(result) {
                    if (result.outcome === 'accepted') {
                        console.log('✅ Приложение установлено');
                    }
                    document.getElementById('installBanner').classList.remove('show');
                    deferredPrompt = null;
                });
            }
        });

        document.getElementById('closeInstallBtn').addEventListener('click', function() {
            document.getElementById('installBanner').classList.remove('show');
        });

        window.addEventListener('appinstalled', function() {
            console.log('✅ Приложение установлено');
            document.getElementById('installBanner').classList.remove('show');
        });

        // === ФУНКЦИЯ ПОКАЗА СООБЩЕНИЙ ===
        function showMessage(text, type) {
            var messageEl = document.getElementById('message');
            messageEl.className = 'message ' + type;
            messageEl.textContent = text;
            messageEl.style.display = 'block';
        }

        function hideMessage() {
            var messageEl = document.getElementById('message');
            messageEl.style.display = 'none';
            messageEl.className = 'message';
        }

        // === ЗАГРУЗКА ПРИЛОЖЕНИЯ ===
        function loadApp(html) {
            var authBlock = document.getElementById('authBlock');
            var appLoader = document.getElementById('appLoader');
            var appContent = document.getElementById('appContent');

            // Скрываем форму входа
            authBlock.style.display = 'none';
            
            // Показываем лоадер
            appLoader.classList.add('show');

            // Загружаем HTML приложения
            setTimeout(function() {
                appContent.innerHTML = html;
                appLoader.classList.remove('show');

                // Перезапускаем скрипты в загруженном HTML
                var scripts = appContent.querySelectorAll('script');
                scripts.forEach(function(script) {
                    var newScript = document.createElement('script');
                    // Копируем все атрибуты
                    for (var i = 0; i < script.attributes.length; i++) {
                        var attr = script.attributes[i];
                        newScript.setAttribute(attr.name, attr.value);
                    }
                    newScript.textContent = script.textContent;
                    script.parentNode.replaceChild(newScript, script);
                });

                // Обновляем GAS_URL в приложении
                if (typeof window.setGASUrl === 'function') {
                    window.setGASUrl(GAS_URL);
                }
            }, 500);
        }

        // === ГЛОБАЛЬНАЯ ОБРАБОТКА ОШИБОК ===
        window.addEventListener('error', function(e) {
            console.error('❌ Глобальная ошибка:', e.message);
            if (document.getElementById('appContent').innerHTML) {
                // Показываем тост, если приложение уже загружено
                if (typeof showToast === 'function') {
                    showToast('Ошибка: ' + e.message, 'error');
                }
            }
        });

        // === АВТОРИЗАЦИЯ ===
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideMessage();
            
            var loadingEl = document.getElementById('loginLoading');
            var loginBtn = document.getElementById('loginBtn');
            
            loadingEl.classList.remove('show');

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showMessage('Заполните все поля.', 'error');
                return;
            }

            // Блокируем кнопку
            loginBtn.disabled = true;
            loginBtn.textContent = 'Вход...';
            loadingEl.classList.add('show');

            try {
                // Хешируем пароль
                var hashedPassword = await hashPassword(password);
                
                // Отправляем запрос к GAS
                var url = GAS_URL + 
                    '?action=login' + 
                    '&username=' + encodeURIComponent(username) + 
                    '&password=' + encodeURIComponent(hashedPassword) +
                    '&t=' + Date.now();

                var response = await fetch(url);
                var text = await response.text();

                loadingEl.classList.remove('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';

                // Проверяем, не вернулся ли JSON с ошибкой
                try {
                    var data = JSON.parse(text);
                    if (data.status === 'error') {
                        showMessage(data.message || 'Ошибка входа', 'error');
                        return;
                    }
                } catch(e) {
                    // Это не JSON - значит это HTML приложения
                }

                // Сохраняем токен
                localStorage.setItem('authToken', username);
                localStorage.setItem('userRole', 'user');
                localStorage.setItem('username', username);
                localStorage.setItem('scripts_loaded', 'true');

                // Загружаем приложение
                loadApp(text);

            } catch (error) {
                loadingEl.classList.remove('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
                console.error('❌ Ошибка:', error);
                showMessage('Ошибка соединения: ' + error.message, 'error');
            }
        });

        // === ПРОВЕРКА ТОКЕНА ПРИ ЗАГРУЗКЕ ===
        (function checkAuth() {
            var token = localStorage.getItem('authToken');
            var scriptsLoaded = localStorage.getItem('scripts_loaded');

            if (token && scriptsLoaded === 'true') {
                console.log('🔑 Токен найден, загружаем приложение');
                
                // Показываем лоадер
                document.getElementById('authBlock').style.display = 'none';
                document.getElementById('appLoader').classList.add('show');

                // Загружаем приложение
                var url = GAS_URL + '?action=app&token=' + encodeURIComponent(token) + '&t=' + Date.now();
                
                fetch(url)
                    .then(function(response) { return response.text(); })
                    .then(function(html) {
                        document.getElementById('appLoader').classList.remove('show');
                        
                        // Проверяем на ошибку
                        try {
                            var data = JSON.parse(html);
                            if (data.status === 'error') {
                                // Токен невалиден - показываем форму входа
                                localStorage.removeItem('authToken');
                                localStorage.removeItem('userRole');
                                localStorage.removeItem('username');
                                localStorage.removeItem('scripts_loaded');
                                document.getElementById('authBlock').style.display = 'block';
                                showMessage('Сессия истекла. Войдите заново.', 'error');
                                return;
                            }
                        } catch(e) {}
                        
                        loadApp(html);
                    })
                    .catch(function(error) {
                        console.error('❌ Ошибка загрузки приложения:', error);
                        document.getElementById('appLoader').classList.remove('show');
                        document.getElementById('authBlock').style.display = 'block';
                        showMessage('Ошибка загрузки приложения. Попробуйте войти заново.', 'error');
                    });
            } else {
                console.log('🔐 Нет токена, показываем форму входа');
            }
        })();

        console.log('✅ Страница загружена');
        console.log('🔑 GAS_URL:', GAS_URL);
    </script>

</body>
</html>
