<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Календарь</title>
  <style>
    body { font-family: Montserrat, sans-serif; background: #FFFDF9; margin: 0; padding: 20px; }
    #app { max-width: 600px; margin: auto; }
    input, button { padding: 10px; margin: 5px; }
  </style>
</head>
<body>
  <div id="app">
    <h1>Авторизация</h1>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Имя" required>
      <input type="password" id="password" placeholder="Пароль" required>
      <button type="submit">Войти</button>
    </form>
    <div id="message"></div>
    <div id="calendarContainer"></div>
  </div>

  <script>
    // Конфигурация: замените YOUR_GAS_URL на URL вашего веб-приложения
    const GAS_URL = 'YOUR_GAS_URL';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        // Пока просто проверяем связь с GAS
        const response = await fetch(GAS_URL);
        const text = await response.text();
        document.getElementById('message').innerHTML = `Ответ сервера: ${text}`;
      } catch (err) {
        document.getElementById('message').innerHTML = `Ошибка: ${err.message}`;
      }
    });
  </script>
</body>
</html>
