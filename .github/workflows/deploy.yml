name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show script.js before injection
        run: |
          echo "=== Содержимое script.js до замены ==="
          cat script.js | head -20

      - name: Inject GAS_URL into script.js (via Node.js)
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
        run: |
          if [ -z "$GAS_URL" ]; then
            echo "::error::Secret GAS_URL is not set"
            exit 1
          fi
          
          # Используем Node.js для надёжной замены
          node -e "
            const fs = require('fs');
            let content = fs.readFileSync('script.js', 'utf8');
            if (!content.includes('{{GAS_URL}}')) {
              console.error('❌ Маркер {{GAS_URL}} не найден в script.js');
              process.exit(1);
            }
            content = content.replace(/{{GAS_URL}}/g, process.env.GAS_URL);
            fs.writeFileSync('script.js', content);
            console.log('✅ GAS_URL injected into script.js');
          "
          
          echo "=== Содержимое script.js после замены ==="
          grep -o "const GAS_URL = '[^']*'" script.js || echo "⚠️ Не удалось найти GAS_URL"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy with injected GAS_URL'