name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files before injection
        run: |
          ls -la
          echo "=== Проверяем script.js ==="
          cat script.js | head -20

      - name: Inject GAS_URL into script.js
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
        run: |
          if [ -z "$GAS_URL" ]; then
            echo "::error::Secret GAS_URL is not set"
            exit 1
          fi
          
          # Проверяем, есть ли маркер в файле
          if ! grep -q "{{GAS_URL}}" script.js; then
            echo "::error::Маркер {{GAS_URL}} не найден в script.js"
            echo "Содержимое script.js:"
            cat script.js
            exit 1
          fi
          
          # Заменяем маркер
          sed -i "s|{{GAS_URL}}|$GAS_URL|g" script.js
          echo "✅ GAS_URL injected into script.js"
          
          # Проверяем результат
          echo "=== Проверяем script.js после замены ==="
          grep -o "const GAS_URL = '[^']*'" script.js || echo "⚠️ Не удалось найти GAS_URL после замены!"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy with injected GAS_URL'