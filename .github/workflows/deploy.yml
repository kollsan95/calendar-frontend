name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject GAS_URL and VERSION into files
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
          VERSION: ${{ github.sha }}
        run: |
          if [ -z "$GAS_URL" ]; then
            echo "::error::Secret GAS_URL is not set"
            exit 1
          fi
          
          # Инжектируем GAS_URL в config.js
          sed -i "s|{{GAS_URL}}|$GAS_URL|g" js/config.js
          echo "✅ GAS_URL injected into config.js"
          
          # Инжектируем VERSION в config.js
          sed -i "s|{{VERSION}}|$VERSION|g" js/config.js
          echo "✅ VERSION injected into config.js"
          
          # Инжектируем VERSION в index.html
          sed -i "s|{{VERSION}}|$VERSION|g" index.html
          echo "✅ VERSION injected into index.html"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy version ${{ env.VERSION }}'